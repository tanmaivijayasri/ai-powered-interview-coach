<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HR Interview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="drawer_styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Face Detection Library -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>

<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo-icon"><i class="fa-solid fa-brain"></i></div>
      <span class="logo-text">InterviewCoach</span>
    </div>

    <nav class="nav-links">
      <a class="nav-item" onclick="window.location.href='dashboard.html?view=dashboard'">
        <i class="fa-solid fa-table-columns"></i>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" onclick="window.location.href='dashboard.html?view=resume'">
        <i class="fa-solid fa-file-contract"></i>
        <span>Resume Analyzer</span>
      </a>
      <a class="nav-item" onclick="window.location.href='dashboard.html?view=interview'">
        <i class="fa-solid fa-comments"></i>
        <span>Mock Interview</span>
      </a>
      <a class="nav-item active">
        <i class="fa-solid fa-user-tie"></i>
        <span>HR Interview</span>
      </a>
      <a class="nav-item" onclick="window.location.href='dashboard.html?view=generator'">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>Question Generator</span>
      </a>
      <a class="nav-item" onclick="window.location.href='dashboard.html?view=personality'">
        <i class="fa-solid fa-face-smile"></i>
        <span>Personality Analyzer</span>
      </a>
      <a class="nav-item" onclick="window.location.href='dashboard.html?view=analytics'">
        <i class="fa-solid fa-chart-line"></i>
        <span>Performance</span>
      </a>
      <a class="nav-item" onclick="window.location.href='dashboard.html?view=settings'">
        <i class="fa-solid fa-gear"></i>
        <span>Settings</span>
      </a>
      <a class="nav-item" onclick="window.location.href='recordings.html'">
      <i class="fa-solid fa-video"></i>
      <span>My Recordings</span>
      </a>
    </nav>

    <button onclick="logout()" class="logout-btn">
      <i class="fa-solid fa-right-from-bracket"></i>
      <span>Logout</span>
    </button>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- HEADER -->
    <header class="top-header">
      <div>
        <h1 class="page-title">HR Interview</h1>
        <p class="welcome-text">Practice HR interview questions with AI</p>
      </div>
    </header>

    <!-- CONTENT -->
    <div style="padding:2rem; max-width:800px;">

      <!-- START SECTION -->
      <div id="startSection">

        <label>Select Job Role</label>
        <select id="hrRole" class="input-box">
          <option value="Software Engineer">Software Engineer</option>
          <option value="Frontend Developer">Frontend Developer</option>
          <option value="Backend Developer">Backend Developer</option>
          <option value="Full Stack Developer">Full Stack Developer</option>
          <option value="Data Analyst">Data Analyst</option>
          <option value="Data Scientist">Data Scientist</option>
          <option value="Product Manager">Product Manager</option>
          <option value="UI/UX Designer">UI/UX Designer</option>
          <option value="DevOps Engineer">DevOps Engineer</option>
          <option value="QA Engineer">QA Engineer</option>
        </select>

        <label style="margin-top:15px;">Number of Questions</label>
        <select id="questionCount" class="input-box">
          <option value="5">5 Questions</option>
          <option value="10">10 Questions</option>
          <option value="20">20 Questions</option>
          <option value="25">25 Questions</option>
        </select>

        <!-- CAMERA TOGGLE BUTTON -->
        <button id="cameraBtn" class="btn-primary hr-btn" onclick="toggleCamera()"
              style="width:100%; margin-top:15px; background:#333;">
              📷 Enable Camera (Optional)
        </button>

<button class="btn-primary hr-btn" onclick="startHRInterview()" style="width:100%; margin-top:10px;">
  Start Interview
</button>
      </div>

      <!-- QUESTION SECTION -->
      <div id="hrSection" style="display:none; margin-top:30px;">

        <!-- CAMERA BUBBLE & CONFIDENCE METER — fixed corner preview -->
        <div id="cameraContainer" style="display:none; position:fixed; top:20px; right:20px; width:160px; z-index:999;">
          <video id="cameraPreview" autoplay muted playsinline
            style="
              width:100%;
              height:120px;
              border-radius:12px;
              border:2px solid #D9FF00;
              object-fit:cover;
              display:block;
            ">
          </video>
          <div id="confidenceMeterContainer" style="margin-top:8px; background:#222; border-radius:8px; padding:6px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
            <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:#ccc; margin-bottom:4px; font-weight:bold;">
              <span>Confidence</span>
              <span id="confidenceText">100%</span>
            </div>
            <div style="width:100%; height:8px; background:#444; border-radius:4px; overflow:hidden;">
              <div id="confidenceBar" style="width:100%; height:100%; background:#00FF94; transition: width 0.3s ease, background-color 0.3s ease;"></div>
            </div>
          </div>
        </div>

<h3 id="hrQuestion"></h3>

        <!-- TEXTAREA -->
        <textarea id="hrAnswer" class="input-box" placeholder="Write your answer here or use the mic below..."></textarea>

        <!-- ✅ MIC BUTTON — placed right below textarea -->
        <button id="micBtn" class="btn-primary" style="width:100%; margin-top:10px;">
          🎤 Speak Answer
        </button>

        <!-- SUBMIT BUTTON — placed below mic -->
        <button class="btn-primary" onclick="submitHRAnswer()" style="width:100%; margin-top:10px;">
          Submit Answer
        </button>

        <!-- Feedback text -->
        <p id="hrFeedback"></p>

        <!-- Next button — hidden by default -->
        <div class="next-btn-container">
          <button id="nextBtn" class="btn-primary next-btn" onclick="nextHRQuestion()" style="display:none;">
            Next Question
          </button>
        </div>

      </div>

      <!-- RESULT SECTION -->
      <div id="hrResult" style="display:none; margin-top:40px; text-align:center;">
        <h2 style="color:#D9FF00;">🎉 Interview Completed</h2>
        <p id="finalScore"></p>

        <button class="btn-primary hr-btn" onclick="restartHRInterview()" style="margin-top:20px;">
          Start Again
        </button>
      </div>

    </div>
<!-- WARNING BANNER -->
<div id="proctoringWarning" style="
  display:none;
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#ff4444;
  color:#fff;
  padding:0.75rem 1.5rem;
  border-radius:10px;
  font-weight:600;
  font-size:0.95rem;
  z-index:9999;
  box-shadow:0 4px 20px rgba(255,68,68,0.4);
  text-align:center;
  max-width:500px;
  width:90%;
">
  ⚠️ <span id="warningText">Warning message here</span>
</div>
  </main>

  <script>
    function logout() {
      localStorage.removeItem("userEmail");
      localStorage.removeItem("jwtToken");
      window.location.href = "index.html";
    }
  </script>

  <script src="hr.js"></script>
  <script src="roles.js"></script>

</body>
</html>
