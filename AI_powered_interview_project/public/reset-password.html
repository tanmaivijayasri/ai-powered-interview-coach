<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewCoach | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Main Wrapper -->
    <div class="auth-page-wrapper">

        <!-- Left Side: Hero Section -->
        <div class="auth-hero">
            <h1 class="hero-title">Master Your Next<br>Technical Interview.</h1>
            <p style="font-size: 1.25rem; color: #888; max-width: 500px; line-height: 1.6;">
                AI-driven mock interviews customized for your role. Get real-time feedback and improve your confidence.
            </p>

            <div class="hero-features">
                <div class="hero-item">
                    <div class="hero-icon"><i class="fa-solid fa-robot"></i></div>
                    <span>AI-Powered Analysis</span>
                </div>
                <div class="hero-item">
                    <div class="hero-icon"><i class="fa-solid fa-chart-line"></i></div>
                    <span>Performance Analytics</span>
                </div>
                <div class="hero-item">
                    <div class="hero-icon"><i class="fa-solid fa-file-contract"></i></div>
                    <span>Resume Tailoring</span>
                </div>
            </div>
        </div>

        <!-- Right Side: Interaction forms -->
        <div class="auth-form-side">
            <div class="auth-card">

                <!-- RESET PASSWORD VIEW -->
                <div id="resetView" class="auth-view">
                    <div class="form-header">
                        <h2>Set New Password</h2>
                        <p>Enter your new password below.</p>
                    </div>

                    <div class="input-group">
                        <label class="input-label">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="resetPassword" placeholder="Min 8 chars">
                            <i class="fa-regular fa-eye eye-icon" onclick="togglePass('resetPassword', this)"></i>
                        </div>
                        <span class="error-message" id="resetPasswordError"></span>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Confirm password">
                            <i class="fa-regular fa-eye eye-icon" onclick="togglePass('confirmPassword', this)"></i>
                        </div>
                        <span class="error-message" id="confirmPasswordError"></span>
                    </div>

                    <button class="btn-primary" onclick="handleReset()">Reset Password</button>

                    <p class="switch-text">
                        <span class="switch-link" onclick="window.location.href='index.html'"><i
                                class="fa-solid fa-arrow-left"></i> Back to Login</span>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const API_URL = "http://localhost:3000";

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert("Invalid or missing password reset token. Please request a new link.");
            window.location.href = "index.html";
        }

        /* --- UI Utilities --- */
        function togglePass(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        /* --- Actions --- */
        async function handleReset() {
            const newPassword = document.getElementById("resetPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            document.getElementById("resetPasswordError").innerText = "";
            document.getElementById("confirmPasswordError").innerText = "";

            if (!newPassword || newPassword.length < 8) {
                return document.getElementById("resetPasswordError").innerText = "Password must be at least 8 characters.";
            }
            if (newPassword !== confirmPassword) {
                return document.getElementById("confirmPasswordError").innerText = "Passwords do not match.";
            }

            try {
                const res = await fetch(`${API_URL}/reset-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();

                if (res.ok) {
                    alert("✅ " + data.message);
                    window.location.href = "index.html";
                } else {
                    alert("❌ " + (data.message || "Failed to reset password"));
                }
            } catch (e) {
                console.error("Frontend error:", e);
                alert("Frontend error occurred");
            }
        }
    </script>
</body>

</html>
